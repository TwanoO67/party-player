services:
  party-player:
    build: .
    container_name: party-player
    ports:
      - "8080:80"
    volumes:
      # Backend PHP (montage pour dev)
      - ./api.php:/var/www/html/api.php
      - ./api:/var/www/html/api
      - ./config.php:/var/www/html/config.php
      # Frontend buildé (montage pour dev, sinon utilisé depuis l'image)
      - ./dist/index.html:/var/www/html/index.html
      - ./dist/assets:/var/www/html/assets
      # Volume persistant pour les playlists
      - playlist-data:/var/www/html/_playlists
      # Fichier .htaccess
      - ./.htaccess:/var/www/html/.htaccess:ro
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html
      - PHP_MEMORY_LIMIT=256M
      - PHP_UPLOAD_MAX_FILESIZE=50M
      - PHP_POST_MAX_SIZE=50M
    restart: unless-stopped
    networks:
      - party-player-network

volumes:
  playlist-data:
    driver: local

networks:
  party-player-network:
    driver: bridge
